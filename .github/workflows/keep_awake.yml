name: Keep Streamlit App Awake

# ─────────────────────────────────────────────────────────────────────
# Pings the deployed Streamlit Community Cloud app every 8 hours to
# prevent the platform from putting it to sleep after 12h of inactivity.
#
# Setup:
#   1. Go to your GitHub repo → Settings → Secrets → Actions
#   2. Add a secret named APP_URL with your Streamlit app URL
#      (e.g. https://your-app-name.streamlit.app/)
#   3. Enable Actions on the repo if not already enabled
# ─────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Runs every 8 hours (well within the 12h sleep window)
    - cron: "0 */8 * * *"   # 00:00, 08:00, 16:00 UTC

  workflow_dispatch:
    # Allows manual triggering from the Actions tab

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit App
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set. Please add it in Settings → Secrets → Actions."
            exit 1
          fi

          echo "🔔 Pinging: $APP_URL"
          echo "⏰ Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            "$APP_URL")

          echo "📡 HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ App is awake and responding (HTTP $HTTP_STATUS)"
          else
            echo "::warning::App returned HTTP $HTTP_STATUS — it may be starting up or experiencing issues."
            exit 0  # Don't fail the workflow; Streamlit may be slow to wake
          fi
