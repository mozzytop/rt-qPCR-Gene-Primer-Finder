name: Keep Streamlit App Awake

# ─────────────────────────────────────────────────────────────────────
# Uses a headless Selenium browser to visit the Streamlit app every
# 6 hours, establishing a real WebSocket session that resets the
# platform's 12-hour inactivity timer.
#
# If the app is already sleeping, the script automatically clicks the
# "Yes, get this app back up!" button to wake it.
#
# Setup:
#   1. Go to your GitHub repo → Settings → Secrets → Actions
#   2. Add a secret named APP_URL with your Streamlit app URL
#      (e.g. https://your-app-name.streamlit.app/)
#   3. Enable Actions on the repo if not already enabled
# ─────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 6 hours (well within the 12h sleep window)
    - cron: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC

  workflow_dispatch:
    # Allows manual triggering from the Actions tab

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Wake / ping Streamlit app
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: python keep_alive.py
